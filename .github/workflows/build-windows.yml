name: Windows build

on:
  push:
    branches: [macos-arm64, windows-build]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          # cache: true persists the pacman package downloads + DB across
          # runs. Saves ~30s per run after the first successful hit. Free
          # for public OSS repos (uses the same 10 GB Actions cache pool
          # as actions/cache@v4).
          cache: true
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-SDL2
            mingw-w64-ucrt-x86_64-glew
            mingw-w64-ucrt-x86_64-python
            mingw-w64-ucrt-x86_64-python-pip

      - name: Create venv + install Conan 1.66
        run: |
          python -m venv ~/.conan-venv
          ~/.conan-venv/bin/pip install 'conan==1.66'
          echo "$HOME/.conan-venv/bin" >> "$GITHUB_PATH"

      - name: Patch Conan settings.yml for current GCC
        run: |
          # Patch settings.yml FIRST, before any profile detection — Conan
          # 1.66's compiler.gcc.version allow-list stops at 14, but MSYS2
          # ships gcc 16+ today (and the next bump won't be far away).
          ~/.conan-venv/bin/python - <<'PY'
          import sys, yaml, pathlib, glob
          venv = pathlib.Path.home() / '.conan-venv'
          sp = glob.glob(str(venv / 'lib/python*/site-packages'))
          if sp: sys.path.insert(0, sp[0])
          import conans.client.conf
          # Seed ~/.conan/settings.yml with conan's defaults if absent.
          p = pathlib.Path.home() / '.conan/settings.yml'
          p.parent.mkdir(parents=True, exist_ok=True)
          if not p.exists():
              p.write_text(conans.client.conf.get_default_settings_yml())
          s = yaml.safe_load(p.read_text())
          v = s['compiler']['gcc']['version']
          for major in range(13, 21):
              for minor in ('', '.0', '.1', '.2', '.3', '.4', '.5'):
                  x = f"{major}{minor}"
                  if x not in v: v.append(x)
          p.write_text(yaml.safe_dump(s, sort_keys=False))
          print(f"Patched gcc.version allowlist; now contains {len(v)} entries")
          PY

          # Build the profile by hand. Two reasons:
          #   1. `conan profile new --detect` picks Visual Studio 17 on a
          #      windows-2022 runner because VS is on PATH ahead of MSYS2
          #      gcc, even from inside the msys2 shell.
          #   2. msys2 bash and Windows Python disagree on what `~` means
          #      (/home/runneradmin vs C:\Users\runneradmin), so we can't
          #      use `cat > ~/.conan/profiles/default` — the Python
          #      conan client wouldn't find the file. Have Python write
          #      it instead so both sides agree on the path.
          GCC_FULL=$(gcc -dumpversion)        # e.g. "16.1.0"
          GCC_MAJOR=${GCC_FULL%%.*}            # "16"
          echo "Using gcc ${GCC_FULL} (major: ${GCC_MAJOR})"
          GCC_MAJOR="$GCC_MAJOR" ~/.conan-venv/bin/python - <<'PY'
          import os, pathlib
          profile_dir = pathlib.Path.home() / '.conan' / 'profiles'
          profile_dir.mkdir(parents=True, exist_ok=True)
          lines = [
              '[settings]',
              'os=Windows',
              'os_build=Windows',
              'arch=x86_64',
              'arch_build=x86_64',
              'compiler=gcc',
              f"compiler.version={os.environ['GCC_MAJOR']}",
              'compiler.libcxx=libstdc++11',
              'build_type=Release',
              '[options]', '[conf]', '[build_requires]', '[env]', '',
          ]
          (profile_dir / 'default').write_text('\n'.join(lines))
          print(f"Wrote {profile_dir / 'default'}")
          PY
          echo "--- conan profile show default ---"
          ~/.conan-venv/bin/conan profile show default

      - name: Restore Conan package cache
        uses: actions/cache@v4
        with:
          path: ~/.conan/data
          key: conan-windows-${{ hashFiles('3space/conanfile.py') }}
          restore-keys: |
            conan-windows-

      - name: Download Conan cmake 3.22 (workaround for CMake 4.x breakage)
        working-directory: 3space
        run: |
          # Fetch cmake 3.22.0 into the Conan cache without building any packages.
          # A subsequent step puts it on PATH so transitive recipes (bzip2, openssl)
          # use cmake 3.22 instead of MSYS2's system cmake 4.x.
          # We `|| true` because the prebuilt cmake/3.22.0 binary may not
          # exist for our compiler triplet — in that case Conan falls back
          # to building it from source on the main install step. Errors are
          # forwarded to stdout so they're visible in the log if needed.
          mkdir -p build
          ~/.conan-venv/bin/conan install cmake/3.22.0@ --build=missing 2>&1 || true

      - name: Conan install (fetch + build missing packages)
        working-directory: 3space
        run: |
          CMAKE322=$(ls -d ~/.conan/data/cmake/3.22.0/_/_/package/*/bin 2>/dev/null | head -1)
          export PATH="$CMAKE322:$PATH"
          mkdir -p build
          ~/.conan-venv/bin/conan install . --install-folder=build --build=missing

      - name: Configure + build 3space
        working-directory: 3space
        run: |
          CMAKE322=$(ls -d ~/.conan/data/cmake/3.22.0/_/_/package/*/bin 2>/dev/null | head -1)
          export PATH="$CMAKE322:/ucrt64/bin:$PATH"
          cmake -S . -B build \
            -G "MinGW Makefiles" \
            -DCMAKE_MAKE_PROGRAM=/ucrt64/bin/mingw32-make.exe \
            -DCMAKE_MODULE_PATH="$(pwd)/build/cmake" \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target 3space -j$(nproc)
          cmake --build build --target cscript_core -j$(nproc)

      - name: Configure + build dts-viewer
        working-directory: examples/dts-viewer
        run: |
          CMAKE322=$(ls -d ~/.conan/data/cmake/3.22.0/_/_/package/*/bin 2>/dev/null | head -1)
          export PATH="$CMAKE322:/ucrt64/bin:$PATH"
          cmake -S . -B build \
            -G "MinGW Makefiles" \
            -DCMAKE_MAKE_PROGRAM=/ucrt64/bin/mingw32-make.exe \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Smoke test (--help)
        working-directory: examples/dts-viewer
        run: ./build/dts-viewer.exe --help || true

      - name: Build portable zip
        shell: pwsh
        run: packaging\windows\build-zip.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Open-Siege-win64
          path: packaging/windows/build/Open-Siege-win64.zip

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/windows/build/Open-Siege-win64.zip
